[toolchain]
anchor_version = "0.32.1"
package_manager = "npm"
solana_version = "3.1.9"

[features]
resolution = true
skip-lint = false

[programs.localnet]
rwa_tokenizer = "RWAtok3nizer1111111111111111111111111111111"

[programs.devnet]
rwa_tokenizer = "RWAtok3nizer1111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = [
    "programs/*"
]

[scripts]
test = "npm exec -- ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
