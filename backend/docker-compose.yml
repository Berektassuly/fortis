# ============================================================================
# Fortis RWA - Docker Compose
# Production-ready configuration with PostgreSQL and application service
# ============================================================================
version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: fortis-rwa-backend-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fortis_rwa_backend
    ports:
      - "5432:5432"
    volumes:
      - fortis_rwa_backend_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fortis_rwa_net

  # ---------------------------------------------------------------------------
  # Fortis RWA Backend Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortis-rwa-backend-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/fortis_rwa_backend
    restart: unless-stopped
    networks:
      - fortis_rwa_net

volumes:
  fortis_rwa_backend_pg_data:
    driver: local

networks:
  fortis_rwa_net:
