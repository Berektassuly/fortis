[toolchain]
anchor_version = "0.32.1"
solana_version = "3.1.9"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.devnet]
rwa_tokenizer = "3zRs8akf1fNjxCp8k3kA46axFrcff8dQvrVPXsTrkvSZ"

[programs.localnet]
rwa_tokenizer = "3zRs8akf1fNjxCp8k3kA46axFrcff8dQvrVPXsTrkvSZ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[workspace]
members = ["programs/rwa_tokenizer"]

[scripts]
test = "npm exec -- ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
